# Reverse-proxy Nginx production (Sprint 10)
# Unifie front statique + REST + GraphQL + WebSocket derriere un seul host.

upstream nexuseats_api {
    server api:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA (React Router) ──
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── REST API ──
    location /api/ {
        proxy_pass http://nexuseats_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Expose les headers custom au front (S7 rate-limit, S9 deprecation)
        add_header Access-Control-Expose-Headers "X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset,Deprecation,Sunset" always;
    }

    # ── GraphQL ──
    location /graphql {
        proxy_pass http://nexuseats_api/graphql;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── WebSocket (Socket.io) — headers Upgrade indispensables ──
    location /socket.io/ {
        proxy_pass http://nexuseats_api/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}
