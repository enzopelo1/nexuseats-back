version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexuseats-postgres
    environment:
      POSTGRES_USER: nexuseats
      POSTGRES_PASSWORD: nexuseats_dev
      POSTGRES_DB: nexuseats
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexuseats"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexuseats-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: nexuseats
      RABBITMQ_DEFAULT_PASS: secret

volumes:
  pgdata:
    driver: local
