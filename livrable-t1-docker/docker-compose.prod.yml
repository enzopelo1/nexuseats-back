version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexuseats-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://nexuseats:nexuseats_prod@postgres:5432/nexuseats
      JWT_SECRET: nexuseats-super-secret-key-change-in-production
      JWT_EXPIRES_IN: 1d
      RABBITMQ_URL: amqp://nexuseats:secret@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3002:3002'
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: nexuseats-postgres-prod
    environment:
      POSTGRES_USER: nexuseats
      POSTGRES_PASSWORD: nexuseats_prod
      POSTGRES_DB: nexuseats
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexuseats']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nexuseats-redis-prod
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexuseats-rabbitmq-prod
    environment:
      RABBITMQ_DEFAULT_USER: nexuseats
      RABBITMQ_DEFAULT_PASS: secret
    ports:
      - '5672:5672'
      - '15672:15672'
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: nexuseats-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexuseats.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '8080:80'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

